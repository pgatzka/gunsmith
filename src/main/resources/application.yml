spring:
  main:
    banner-mode: off
  batch:
    job:
      enabled: false
  application:
    name: gunsmith

logging:
  level:
    io.github.pgatzka.gunsmith: info
    org.jooq.Constants: warn


management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - jooqstats
gunsmith:
  api:
    url: https://api.tarkov.dev/graphql
    backoff: 500ms
    permits: 60
    retries: 5
  job:
    min-delay: 1s
    max-delay: 30s
    startup-delay: 5s
    target: 50000
    slowdown-threshold: 0.5
