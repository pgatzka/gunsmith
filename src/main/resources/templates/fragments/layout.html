<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title, refreshSeconds)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta th:if="${refreshSeconds != null and refreshSeconds > 0}"
          http-equiv="refresh" th:attr="content=${refreshSeconds}"/>
    <title th:text="|GUNSMITH // ${title}|">GUNSMITH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>

<body th:fragment="body(title, active, content)">
<header class="manual-bar">
    <div class="manual-bar__inner">
        <a class="manual-bar__title" th:href="@{/weapons}">
            <span class="manual-bar__sigil">G/S</span>
            <span class="manual-bar__name">GUNSMITH</span>
            <span class="manual-bar__sub">FIELD MANUAL · TKV-1</span>
        </a>
        <nav class="manual-nav" aria-label="Primary">
            <a class="manual-nav__link"
               th:classappend="${active == 'weapons'} ? ' is-active' : ''"
               th:href="@{/weapons}">WEAPONS</a>
            <a class="manual-nav__link"
               th:classappend="${active == 'throughput'} ? ' is-active' : ''"
               th:href="@{/stats/throughput}">THROUGHPUT</a>
        </nav>
        <div class="manual-bar__meta">
            <span class="manual-bar__cell">CLASS</span>
            <span class="manual-bar__cell manual-bar__cell--accent">UNRESTRICTED</span>
            <span class="manual-bar__cell" th:text="${title}">SECTION</span>
        </div>
    </div>
    <div class="manual-bar__stripe" aria-hidden="true"></div>
</header>

<main class="page">
    <div th:replace="${content}"></div>
</main>

<footer class="manual-foot">
    <span>END OF DOCUMENT</span>
    <span class="manual-foot__line" aria-hidden="true"></span>
    <span>GUNSMITH · BUILD INDEX</span>
</footer>
</body>
</html>
