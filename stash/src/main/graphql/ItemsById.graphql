query ItemsById($ids: [ID]!) {
  items(ids: $ids) {
    id
    name
    category {
      name
    }
    conflictingItems {
      id
      types
    }
    properties {
      ... on ItemPropertiesWeapon {
        ergonomics
        recoilHorizontal
        recoilVertical
        slots {
          id
          name
          required
          filters {
            allowedItems {
              id
            }
          }
        }
      }
      ... on ItemPropertiesScope {
        ergonomics
        recoilModifier
        slots {
          id
          name
          required
          filters {
            allowedItems {
              id
            }
          }
        }
      }
      ... on ItemPropertiesWeaponMod {
        ergonomics
        recoilModifier
        slots {
          id
          name
          required
          filters {
            allowedItems {
              id
            }
          }
        }
      }
      ... on ItemPropertiesMagazine {
        ergonomics
        recoilModifier
        slots {
          id
          name
          required
          filters {
            allowedItems {
              id
            }
          }
        }
      }
      ... on ItemPropertiesBarrel {
        ergonomics
        recoilModifier
        slots {
          id
          name
          required
          filters {
            allowedItems {
              id
            }
          }
        }
      }
    }
  }
}